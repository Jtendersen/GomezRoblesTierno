<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Registrar Pago - HogarYA</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 500px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 6px; box-sizing: border-box; }
        .readonly { background: #f5f5f5; color: #555; }
        .error { color: red; margin-bottom: 10px; }
        .btn { padding: 8px 16px; text-decoration: none; border-radius: 4px; color: white; border: none; cursor: pointer; }
        .btn-pagar    { background: #FF9800; }
        .btn-cancelar { background: #9E9E9E; }
    </style>
</head>
<body>
    <h1>Registrar Pago — Factura #<span th:text="${factura.id}"></span></h1>

    <p class="error" th:if="${error}" th:text="${error}"></p>

    <!-- Datos de la factura (solo lectura) -->
    <label>Contrato</label>
    <input class="readonly" type="text" readonly
           th:value="${factura.contrato.propiedad.direccion + ' - ' + factura.contrato.propiedad.ciudad.nombre + ' | Inquilino: ' + factura.contrato.inquilino.nombreCompleto}" />

    <label>Concepto</label>
    <input class="readonly" type="text" readonly th:value="${factura.conceptoFacturado}" />

    <label>Importe original</label>
    <input class="readonly" type="text" readonly th:value="${'$' + factura.importe}" />

    <label>Estado actual</label>
    <input class="readonly" type="text" readonly th:value="${factura.estado}" />

    <hr>

    <!-- Formulario de pago -->
    <form th:action="@{/facturas/pagar/{id}(id=${factura.id})}" method="post">
        <label>Fecha de pago</label>
        <input type="date" name="fechaPago" required />

        <label>Medio de pago</label>
        <select name="medio" required>
            <option value="">-- Seleccione --</option>
            <option th:each="m : ${medios}" th:value="${m}" th:text="${m}"></option>
        </select>

        <label>Importe pagado ($)</label>
        <input type="number" step="0.01" min="0.01" name="importePagado" required />

        <label>Interes ($) — dejar en 0 si no aplica</label>
        <input type="number" step="0.01" min="0" name="interes" value="0" />

        <br><br>
        <button type="submit" class="btn btn-pagar">Confirmar Pago</button>
        <a class="btn btn-cancelar" th:href="@{/facturas}">Cancelar</a>
    </form>
</body>
</html>
