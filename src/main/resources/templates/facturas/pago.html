<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Registrar Pago — HogarYA</title>
    <link rel="stylesheet" th:href="@{/css/hogarya.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="logo" th:href="@{/}"><img th:src="@{/images/logo.png}" alt="HogarYA"/></a>
    <nav>
        <a th:href="@{/propiedades}">Propiedades</a>
        <a th:href="@{/publicaciones}">Publicaciones</a>
        <a th:href="@{/contratos}">Contratos</a>
        <a th:href="@{/facturas}" class="active">Facturas</a>
    </nav>
</nav>

<div class="main-content">
    <div class="page-header">
        <h1>Registrar Pago — Factura #<span th:text="${factura.id}"></span></h1>
    </div>

    <div class="card" style="max-width:520px;">
        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <!-- Resumen de la factura (solo lectura) -->
        <div class="form-group">
            <label>Contrato</label>
            <input type="text" disabled
                   th:value="${factura.contrato.propiedad.direccion + ' — ' + factura.contrato.propiedad.ciudad.nombre + ' | ' + factura.contrato.inquilino.nombreCompleto}"/>
        </div>
        <div class="form-group">
            <label>Concepto</label>
            <input type="text" disabled th:value="${factura.conceptoFacturado}"/>
        </div>
        <div class="form-group">
            <label>Importe Original</label>
            <input type="text" disabled th:value="${'$' + #numbers.formatDecimal(factura.importe, 1, 2)}"/>
        </div>
        <div class="form-group">
            <label>Estado Actual</label>
            <input type="text" disabled th:value="${factura.estado}"/>
        </div>

        <hr/>

        <!-- Datos de pago -->
        <form th:action="@{/facturas/pagar/{id}(id=${factura.id})}" method="post">
            <div class="form-group">
                <label>Fecha de Pago</label>
                <input type="date" name="fechaPago" required/>
            </div>
            <div class="form-group">
                <label>Medio de Pago</label>
                <select name="medio" required>
                    <option value="">— Seleccione —</option>
                    <option th:each="m : ${medios}" th:value="${m}" th:text="${m}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Importe Pagado ($)</label>
                <input type="number" step="0.01" min="0.01" name="importePagado" required/>
            </div>
            <div class="form-group">
                <label>Interés ($) — dejar en 0 si no aplica</label>
                <input type="number" step="0.01" min="0" name="interes" value="0"/>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-pagar">Confirmar Pago</button>
                <a class="btn btn-neutral" th:href="@{/facturas}">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<footer class="footer">HogarYA &mdash; Grupo GomezRoblesTierno &mdash; UTN FRSF DESI 2026</footer>
</body>
</html>
