<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Propiedades — HogarYA</title>
    <link rel="stylesheet" th:href="@{/css/hogarya.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="logo" th:href="@{/}"><img th:src="@{/images/logo.png}" alt="HogarYA"/></a>
    <nav>
        <a th:href="@{/propiedades}" class="active">Propiedades</a>
        <a th:href="@{/publicaciones}">Publicaciones</a>
        <a th:href="@{/contratos}">Contratos</a>
        <a th:href="@{/facturas}">Facturas</a>
    </nav>
</nav>

<div class="main-content">

    <div class="page-header">
        <h1>Propiedades</h1>
        <a class="btn btn-primary" th:href="@{/propiedades/nueva}">+ Nueva Propiedad</a>
    </div>

    <!-- Filtros -->
    <form th:action="@{/propiedades}" method="get" class="filtros">
        <div class="form-group">
            <label>Dirección</label>
            <input type="text" name="direccion" th:value="${filtroDireccion}" placeholder="Buscar..."/>
        </div>
        <div class="form-group">
            <label>Ciudad</label>
            <select name="ciudadId">
                <option value="">— Todas —</option>
                <option th:each="c : ${ciudades}" th:value="${c.id}" th:text="${c.nombre}"
                        th:selected="${c.id == filtroCiudadId}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>Tipo</label>
            <select name="tipo">
                <option value="">— Todos —</option>
                <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"
                        th:selected="${t == filtroTipo}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>Estado</label>
            <select name="estado">
                <option value="">— Todos —</option>
                <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"
                        th:selected="${e == filtroEstado}"></option>
            </select>
        </div>
        <div style="display:flex; gap:8px; align-items:flex-end;">
            <button type="submit" class="btn btn-secondary">Buscar</button>
            <a th:href="@{/propiedades}" class="btn btn-neutral">Limpiar</a>
        </div>
    </form>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Dirección</th>
                    <th>Ciudad</th>
                    <th>Tipo</th>
                    <th>Amb.</th>
                    <th>m²</th>
                    <th>Estado</th>
                    <th>Propietario</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${propiedades}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.direccion}"></td>
                    <td th:text="${p.ciudad.nombre + ', ' + p.ciudad.provincia.nombre}"></td>
                    <td th:text="${p.tipo}"></td>
                    <td th:text="${p.cantidadAmbientes}"></td>
                    <td th:text="${p.metrosCuadrados}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="'badge-' + ${p.estadoDisponibilidad.name()}"
                              th:text="${p.estadoDisponibilidad}"></span>
                    </td>
                    <td th:text="${p.propietario.nombreCompleto}"></td>
                    <td>
                        <a class="btn btn-primary" th:href="@{/propiedades/editar/{id}(id=${p.id})}">Editar</a>
                        <a class="btn btn-danger" th:href="@{/propiedades/eliminar/{id}(id=${p.id})}"
                           onclick="return confirm('¿Eliminar esta propiedad?')">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<footer class="footer">HogarYA &mdash; Grupo GomezRoblesTierno &mdash; UTN FRSF DESI 2026</footer>
</body>
</html>
