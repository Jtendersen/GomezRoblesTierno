<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Contratos</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .btn { padding: 5px 10px; margin-right: 4px; text-decoration: none; color: white; border-radius: 4px; font-size: 13px; }
        .btn-nuevo     { background-color: #27ae60; padding: 10px 15px; }
        .btn-editar    { background-color: #3498db; }
        .btn-eliminar  { background-color: #e74c3c; }
        .btn-activar   { background-color: #27ae60; }
        .btn-finalizar { background-color: #8e44ad; }
        .btn-rescindir { background-color: #e67e22; }
        .error { color: #e74c3c; font-weight: bold; padding: 10px; border: 1px solid #e74c3c; margin-bottom: 15px; }
        .badge { padding: 3px 8px; border-radius: 4px; color: white; font-size: 12px; font-weight: bold; }
        .badge-borrador  { background-color: #95a5a6; }
        .badge-activo    { background-color: #27ae60; }
        .badge-finalizado { background-color: #8e44ad; }
        .badge-rescindido { background-color: #e67e22; }
    </style>
</head>
<body>

    <h1>Contratos</h1>

    <div class="error" th:if="${error}" th:text="${error}"></div>

    <a class="btn btn-nuevo" th:href="@{/contratos/nuevo}">+ Nuevo Contrato</a>

    <br><br>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Propiedad</th>
                <th>Propietario</th>
                <th>Inquilino</th>
                <th>Inicio</th>
                <th>Duración</th>
                <th>Importe</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${contratos}">
                <td th:text="${c.id}"></td>
                <td th:text="${c.propiedad.direccion + ' - ' + c.propiedad.ciudad.nombre}"></td>
                <td th:text="${c.propietario.nombreCompleto}"></td>
                <td th:text="${c.inquilino.nombreCompleto}"></td>
                <td th:text="${#temporals.format(c.fechaInicio, 'dd/MM/yyyy')}"></td>
                <td th:text="${c.duracionMeses + ' meses'}"></td>
                <td th:text="${'$' + #numbers.formatDecimal(c.importeMensual, 1, 2)}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${c.estado.name() == 'BORRADOR'  ? 'badge-borrador'  :
                                           c.estado.name() == 'ACTIVO'     ? 'badge-activo'    :
                                           c.estado.name() == 'FINALIZADO' ? 'badge-finalizado' :
                                                                              'badge-rescindido'}"
                          th:text="${c.estado}">
                    </span>
                </td>
                <td>
                    <!-- Acciones para BORRADOR -->
                    <th:block th:if="${c.estado.name() == 'BORRADOR'}">
                        <a class="btn btn-editar"
                           th:href="@{/contratos/editar/{id}(id=${c.id})}">Editar</a>
                        <a class="btn btn-eliminar"
                           th:href="@{/contratos/eliminar/{id}(id=${c.id})}"
                           onclick="return confirm('¿Seguro que desea eliminar este contrato?');">Eliminar</a>
                        <a class="btn btn-activar"
                           th:href="@{/contratos/cambiarEstado/{id}(id=${c.id}, nuevoEstado='ACTIVO')}"
                           onclick="return confirm('¿Activar este contrato? La propiedad pasará a ALQUILADA.');">Activar</a>
                    </th:block>

                    <!-- Acciones para ACTIVO -->
                    <th:block th:if="${c.estado.name() == 'ACTIVO'}">
                        <a class="btn btn-finalizar"
                           th:href="@{/contratos/cambiarEstado/{id}(id=${c.id}, nuevoEstado='FINALIZADO')}"
                           onclick="return confirm('¿Finalizar este contrato? La propiedad volverá a DISPONIBLE.');">Finalizar</a>
                        <a class="btn btn-rescindir"
                           th:href="@{/contratos/cambiarEstado/{id}(id=${c.id}, nuevoEstado='RESCINDIDO')}"
                           onclick="return confirm('¿Rescindir este contrato? La propiedad volverá a DISPONIBLE.');">Rescindir</a>
                    </th:block>

                    <!-- Sin acciones para FINALIZADO / RESCINDIDO -->
                    <th:block th:if="${c.estado.name() == 'FINALIZADO' or c.estado.name() == 'RESCINDIDO'}">
                        <span style="color: #aaa;">—</span>
                    </th:block>
                </td>
            </tr>
        </tbody>
    </table>

    <br>
    <a th:href="@{/}">← Volver al inicio</a>

</body>
</html>
