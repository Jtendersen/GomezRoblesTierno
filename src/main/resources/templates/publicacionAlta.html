<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta de Publicación - HogarYA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Registrar Publicación</h2>

    <div th:if="${errorNegocio != null}" class="alert alert-danger" role="alert">
        <span th:text="${errorNegocio}"></span>
    </div>

    <form th:action="@{/publicaciones/guardar}" th:object="${formBean}" method="post">
        
        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Propiedad</label>
            <select th:field="*{idPropiedad}" class="form-select" th:classappend="${#fields.hasErrors('idPropiedad')} ? 'is-invalid' : ''">
                <option value="" disabled selected>Seleccione una propiedad...</option>
                <option th:each="prop : ${listaPropiedades}" 
                        th:value="${prop.id}" 
                        th:text="${prop.direccion + ' - ' + prop.ciudad.nombre}">
                </option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('idPropiedad')}" th:errors="*{idPropiedad}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Precio Mensual ($)</label>
            <input type="number" step="0.01" th:field="*{precioMensual}" class="form-control" th:classappend="${#fields.hasErrors('precioMensual')} ? 'is-invalid' : ''"/>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('precioMensual')}" th:errors="*{precioMensual}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Condiciones</label>
            <textarea th:field="*{condiciones}" class="form-control" rows="3" th:classappend="${#fields.hasErrors('condiciones')} ? 'is-invalid' : ''"></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('condiciones')}" th:errors="*{condiciones}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Descripción de la publicación</label>
            <textarea th:field="*{descripcion}" class="form-control" rows="3" th:classappend="${#fields.hasErrors('descripcion')} ? 'is-invalid' : ''"></textarea>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Estado de la Publicación</label>
            <select th:field="*{estado}" class="form-select" th:classappend="${#fields.hasErrors('estado')} ? 'is-invalid' : ''">
                <option value="" disabled selected>Seleccione estado...</option>
                <option th:each="est : ${listaEstados}" th:value="${est}" th:text="${est}"></option>
            </select>
            <div class="invalid-feedback" th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></div>
        </div>

        <button type="submit" class="btn btn-primary">Guardar Publicación</button>
        <a href="/publicaciones/listado" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
