<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Propiedad — HogarYA</title>
    <link rel="stylesheet" th:href="@{/css/hogarya.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="logo" th:href="@{/}"><img th:src="@{/images/logo.png}" alt="HogarYA"/></a>
    <nav>
        <a th:href="@{/propiedades}" class="active">Propiedades</a>
        <a th:href="@{/publicaciones}">Publicaciones</a>
        <a th:href="@{/contratos}">Contratos</a>
        <a th:href="@{/facturas}">Facturas</a>
    </nav>
</nav>

<div class="main-content">
    <div class="page-header">
        <h1 th:text="${propiedad.id == null} ? 'Nueva Propiedad' : 'Editar Propiedad #' + propiedad.id"></h1>
    </div>

    <div class="card" style="max-width:560px;">
        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/propiedades/guardar}" th:object="${propiedad}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div class="form-group">
                <label>Dirección</label>
                <input type="text" th:field="*{direccion}" required/>
            </div>
            <div class="form-group">
                <label>Ciudad</label>
                <select th:field="*{ciudad}" required>
                    <option value="">— Seleccione —</option>
                    <option th:each="c : ${ciudades}" th:value="${c.id}" th:text="${c.nombre}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Tipo de Propiedad</label>
                <select th:field="*{tipo}" required>
                    <option value="">— Seleccione —</option>
                    <option th:each="t : ${T(ar.edu.utn.desi.hogarya.model.TipoPropiedad).values()}"
                            th:value="${t}" th:text="${t}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Cantidad de Ambientes</label>
                <input type="number" min="1" th:field="*{cantidadAmbientes}" required/>
            </div>
            <div class="form-group">
                <label>Metros Cuadrados</label>
                <input type="number" min="1" step="0.01" th:field="*{metrosCuadrados}" required/>
            </div>
            <div class="form-group">
                <label>Descripción</label>
                <textarea th:field="*{descripcion}" required></textarea>
            </div>
            <div class="form-group">
                <label>Comodidades</label>
                <textarea th:field="*{comodidades}" placeholder="Ej: Cochera, Pileta, Balcón..."></textarea>
            </div>
            <div class="form-group">
                <label>Estado de Disponibilidad</label>
                <select th:field="*{estadoDisponibilidad}" required>
                    <option th:each="e : ${T(ar.edu.utn.desi.hogarya.model.EstadoDisponibilidad).values()}"
                            th:value="${e}" th:text="${e}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Propietario</label>
                <select th:field="*{propietario}" required>
                    <option value="">— Seleccione —</option>
                    <option th:each="p : ${propietarios}" th:value="${p.id}" th:text="${p.nombreCompleto}"></option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a class="btn btn-neutral" th:href="@{/propiedades}">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<footer class="footer">HogarYA &mdash; Grupo GomezRoblesTierno &mdash; UTN FRSF DESI 2026</footer>
</body>
</html>
