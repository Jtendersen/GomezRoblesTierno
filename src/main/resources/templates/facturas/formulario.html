<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Factura - HogarYA</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 500px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 6px; box-sizing: border-box; }
        .error { color: red; margin-bottom: 10px; }
        .btn { padding: 8px 16px; text-decoration: none; border-radius: 4px; color: white; border: none; cursor: pointer; }
        .btn-guardar { background: #4CAF50; }
        .btn-cancelar { background: #9E9E9E; }
    </style>
</head>
<body>
    <h1 th:text="${factura.id == null} ? 'Nueva Factura' : 'Editar Factura #' + factura.id"></h1>

    <p class="error" th:if="${error}" th:text="${error}"></p>

    <!-- Alta: POST /facturas/guardar | Edicion: POST /facturas/actualizar/{id} -->
    <form th:if="${factura.id == null}" th:action="@{/facturas/guardar}" th:object="${factura}" method="post">
        <label>Contrato</label>
        <select th:field="*{contrato.id}" required>
            <option value="">-- Seleccione un contrato --</option>
            <option th:each="c : ${contratos}"
                    th:value="${c.id}"
                    th:text="${c.propiedad.direccion + ' - ' + c.propiedad.ciudad.nombre + ' | Inquilino: ' + c.inquilino.nombreCompleto}">
            </option>
        </select>

        <label>Concepto facturado</label>
        <input type="text" th:field="*{conceptoFacturado}" required />

        <label>Importe ($)</label>
        <input type="number" step="0.01" min="0.01" th:field="*{importe}" required />

        <label>Fecha de emision</label>
        <input type="date" th:field="*{fechaEmision}" required />

        <label>Fecha de vencimiento</label>
        <input type="date" th:field="*{fechaVencimiento}" required />

        <br><br>
        <button type="submit" class="btn btn-guardar">Guardar</button>
        <a class="btn btn-cancelar" th:href="@{/facturas}">Cancelar</a>
    </form>

    <form th:if="${factura.id != null}" th:action="@{/facturas/actualizar/{id}(id=${factura.id})}" th:object="${factura}" method="post">
        <label>Contrato</label>
        <!-- En edicion el contrato no se puede cambiar -->
        <input type="text" disabled
               th:value="${factura.contrato.propiedad.direccion + ' - ' + factura.contrato.propiedad.ciudad.nombre + ' | Inquilino: ' + factura.contrato.inquilino.nombreCompleto}" />

        <label>Concepto facturado</label>
        <input type="text" th:field="*{conceptoFacturado}" required />

        <label>Importe ($)</label>
        <input type="number" step="0.01" min="0.01" th:field="*{importe}" required />

        <label>Fecha de emision</label>
        <input type="date" th:field="*{fechaEmision}" required />

        <label>Fecha de vencimiento</label>
        <input type="date" th:field="*{fechaVencimiento}" required />

        <br><br>
        <button type="submit" class="btn btn-guardar">Guardar cambios</button>
        <a class="btn btn-cancelar" th:href="@{/facturas}">Cancelar</a>
    </form>
</body>
</html>
