<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Propiedades</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background-color: #2c3e50; color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
        .btn { padding: 5px 10px; margin-right: 5px; text-decoration: none; color: white; border-radius: 4px; }
        .btn-editar { background-color: #3498db; }
        .btn-eliminar { background-color: #e74c3c; }
        .btn-nuevo { background-color: #27ae60; padding: 10px 15px; }
    </style>
</head>
<body>

    <h1>Propiedades</h1>

	<a class="btn btn-nuevo" th:href="@{/propiedades/nueva}">+ Nueva Propiedad</a>

	<br><br>

	<form th:action="@{/propiedades}" method="get" style="margin-bottom: 20px;">
	    <label>Direccion:</label>
	    <input type="text" name="direccion" th:value="${filtroDireccion}" />

	    <label>Ciudad:</label>
	    <select name="ciudadId">
	        <option value="">-- Todas --</option>
	        <option th:each="c : ${ciudades}" th:value="${c.id}" th:text="${c.nombre}"
	                th:selected="${c.id == filtroCiudadId}"></option>
	    </select>

	    <label>Tipo:</label>
	    <select name="tipo">
	        <option value="">-- Todos --</option>
	        <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"
	                th:selected="${t == filtroTipo}"></option>
	    </select>

	    <label>Estado:</label>
	    <select name="estado">
	        <option value="">-- Todos --</option>
	        <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"
	                th:selected="${e == filtroEstado}"></option>
	    </select>

	    <button type="submit" class="btn btn-nuevo" style="margin-left: 10px;">Buscar</button>
	    <a th:href="@{/propiedades}" class="btn btn-editar">Limpiar filtros</a>
	</form>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Direccion</th>
                <th>Ciudad</th>
                <th>Tipo</th>
                <th>Ambientes</th>
                <th>m2</th>
                <th>Estado</th>
                <th>Propietario</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${propiedades}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.direccion}"></td>
                <td th:text="${p.ciudad.nombre}"></td>
                <td th:text="${p.tipo}"></td>
                <td th:text="${p.cantidadAmbientes}"></td>
                <td th:text="${p.metrosCuadrados}"></td>
                <td th:text="${p.estadoDisponibilidad}"></td>
                <td th:text="${p.propietario.nombreCompleto}"></td>
                <td>
                    <a class="btn btn-editar" th:href="@{/propiedades/editar/{id}(id=${p.id})}">Editar</a>
                    <a class="btn btn-eliminar" th:href="@{/propiedades/eliminar/{id}(id=${p.id})}"
                       onclick="return confirm('¿Seguro que desea eliminar esta propiedad?');">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
