<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Contrato — HogarYA</title>
    <link rel="stylesheet" th:href="@{/css/hogarya.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="logo" th:href="@{/}"><img th:src="@{/images/logo.png}" alt="HogarYA"/></a>
    <nav>
        <a th:href="@{/propiedades}">Propiedades</a>
        <a th:href="@{/publicaciones}">Publicaciones</a>
        <a th:href="@{/contratos}" class="active">Contratos</a>
        <a th:href="@{/facturas}">Facturas</a>
    </nav>
</nav>

<div class="main-content">
    <div class="page-header">
        <h1 th:text="${contrato.id == null} ? 'Nuevo Contrato' : 'Editar Contrato #' + contrato.id"></h1>
    </div>

    <div class="card" style="max-width:560px;">
        <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

        <form th:action="@{/contratos/guardar}" th:object="${contrato}" method="post">
            <input type="hidden" th:field="*{id}"/>

            <div class="form-group">
                <label>Propiedad</label>
                <select th:field="*{propiedad}" required>
                    <option value="">— Seleccione una propiedad —</option>
                    <option th:each="p : ${propiedades}"
                            th:value="${p.id}"
                            th:text="${p.direccion + ' — ' + p.ciudad.nombre + ' (' + p.estadoDisponibilidad + ')'}">
                    </option>
                </select>
                <small style="color:#6b7f96;">El propietario se asigna automáticamente.</small>
            </div>

            <div class="form-group">
                <label>Inquilino</label>
                <select th:field="*{inquilino}" required>
                    <option value="">— Seleccione un inquilino —</option>
                    <option th:each="i : ${inquilinos}"
                            th:value="${i.id}"
                            th:text="${i.nombreCompleto + ' — ' + i.dniCuit}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Fecha de Inicio</label>
                <input type="date" th:field="*{fechaInicio}" required/>
            </div>

            <div class="form-group">
                <label>Duración (meses)</label>
                <input type="number" min="1" th:field="*{duracionMeses}" required/>
            </div>

            <div class="form-group">
                <label>Importe Mensual ($)</label>
                <input type="number" min="0.01" step="0.01" th:field="*{importeMensual}" required/>
            </div>

            <div class="form-group">
                <label>Día de Vencimiento Mensual (1-31)</label>
                <input type="number" min="1" max="31" th:field="*{diaVencimientoMensual}" required/>
            </div>

            <div class="form-group">
                <label>Descripción</label>
                <textarea th:field="*{descripcion}" rows="3"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a class="btn btn-neutral" th:href="@{/contratos}">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<footer class="footer">HogarYA &mdash; Grupo GomezRoblesTierno &mdash; UTN FRSF DESI 2026</footer>
</body>
</html>
