<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Publicación — HogarYA</title>
    <link rel="stylesheet" th:href="@{/css/hogarya.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="logo" th:href="@{/}"><img th:src="@{/images/logo.png}" alt="HogarYA"/></a>
    <nav>
        <a th:href="@{/propiedades}">Propiedades</a>
        <a th:href="@{/publicaciones}" class="active">Publicaciones</a>
        <a th:href="@{/contratos}">Contratos</a>
        <a th:href="@{/facturas}">Facturas</a>
    </nav>
</nav>

<div class="main-content">
    <div class="page-header">
        <h1 th:text="${formBean.id == null} ? 'Nueva Publicación' : 'Editar Publicación #' + ${formBean.id}"></h1>
    </div>

    <div class="card" style="max-width:560px;">

        <!-- Error de negocio -->
        <div class="alert alert-error" th:if="${errorNegocio}" th:text="${errorNegocio}"></div>

        <form th:action="@{/publicaciones/guardar}" th:object="${formBean}" method="post">

            <!-- ID oculto para diferenciar alta vs edición -->
            <input type="hidden" th:field="*{id}"/>

            <!-- Propiedad: solo lectura si es edición (HU 2.3) -->
            <div class="form-group">
                <label>Propiedad</label>
                <select th:field="*{idPropiedad}" required th:disabled="${formBean.id != null}">
                    <option value="">— Seleccione —</option>
                    <option th:each="prop : ${listaPropiedades}"
                            th:value="${prop.id}"
                            th:text="${prop.direccion + ' - ' + prop.ciudad.nombre}"></option>
                </select>
                <!-- Si es edición, enviamos el valor igualmente (disabled no envía) -->
                <input th:if="${formBean.id != null}" type="hidden" th:field="*{idPropiedad}"/>
                <small th:if="${formBean.id != null}" style="color:#6b7f96;">
                    La propiedad no puede modificarse una vez creada la publicación.
                </small>
                <span class="field-error" th:if="${#fields.hasErrors('idPropiedad')}" th:errors="*{idPropiedad}"></span>
            </div>

            <div class="form-group">
                <label>Fecha de Publicación</label>
                <input type="date" th:field="*{fechaPublicacion}" required/>
                <span class="field-error" th:if="${#fields.hasErrors('fechaPublicacion')}" th:errors="*{fechaPublicacion}"></span>
            </div>

            <div class="form-group">
                <label>Precio Mensual ($)</label>
                <input type="number" step="0.01" min="0.01" th:field="*{precioMensual}" required/>
                <span class="field-error" th:if="${#fields.hasErrors('precioMensual')}" th:errors="*{precioMensual}"></span>
            </div>

            <div class="form-group">
                <label>Condiciones</label>
                <textarea th:field="*{condiciones}" rows="3" required
                          placeholder="Ej: Depósito 2 meses, garantía propietario, no mascotas..."></textarea>
                <span class="field-error" th:if="${#fields.hasErrors('condiciones')}" th:errors="*{condiciones}"></span>
            </div>

            <div class="form-group">
                <label>Descripción</label>
                <textarea th:field="*{descripcion}" rows="3" required
                          placeholder="Descripción de la propiedad publicada..."></textarea>
                <span class="field-error" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></span>
            </div>

            <div class="form-group">
                <label>Estado</label>
                <select th:field="*{estado}" required>
                    <option value="">— Seleccione —</option>
                    <option th:each="est : ${listaEstados}" th:value="${est}" th:text="${est}"></option>
                </select>
                <span class="field-error" th:if="${#fields.hasErrors('estado')}" th:errors="*{estado}"></span>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a class="btn btn-neutral" th:href="@{/publicaciones}">Cancelar</a>
            </div>

        </form>
    </div>
</div>

<footer class="footer">HogarYA &mdash; Grupo GomezRoblesTierno &mdash; UTN FRSF DESI 2026</footer>
</body>
</html>
