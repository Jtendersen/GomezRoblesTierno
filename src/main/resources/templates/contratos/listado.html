<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Contratos — HogarYA</title>
    <link rel="stylesheet" th:href="@{/css/hogarya.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="logo" th:href="@{/}"><img th:src="@{/images/logo.png}" alt="HogarYA"/></a>
    <nav>
        <a th:href="@{/propiedades}">Propiedades</a>
        <a th:href="@{/publicaciones}">Publicaciones</a>
        <a th:href="@{/contratos}" class="active">Contratos</a>
        <a th:href="@{/facturas}">Facturas</a>
    </nav>
</nav>

<div class="main-content">

    <div class="page-header">
        <h1>Contratos</h1>
        <a class="btn btn-primary" th:href="@{/contratos/nuevo}">+ Nuevo Contrato</a>
    </div>

    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <!-- Filtros (HU 3.4) -->
    <form th:action="@{/contratos}" method="get" class="filtros">
        <div class="form-group">
            <label>Propiedad</label>
            <select name="propiedadId">
                <option value="">— Todas —</option>
                <option th:each="p : ${propiedades}"
                        th:value="${p.id}"
                        th:text="${p.direccion + ' — ' + p.ciudad.nombre}"
                        th:selected="${p.id == filtroPropiedadId}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>Inquilino</label>
            <select name="inquilinoId">
                <option value="">— Todos —</option>
                <option th:each="i : ${inquilinos}"
                        th:value="${i.id}"
                        th:text="${i.nombreCompleto}"
                        th:selected="${i.id == filtroInquilinoId}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>Estado</label>
            <select name="estado">
                <option value="">— Todos —</option>
                <option th:each="e : ${estados}"
                        th:value="${e}"
                        th:text="${e}"
                        th:selected="${e == filtroEstado}"></option>
            </select>
        </div>
        <div class="form-group">
            <label>Fecha inicio desde</label>
            <input type="date" name="fechaDesde" th:value="${filtroFechaDesde}"/>
        </div>
        <div style="display:flex; gap:8px; align-items:flex-end;">
            <button type="submit" class="btn btn-secondary">Buscar</button>
            <a th:href="@{/contratos}" class="btn btn-neutral">Limpiar</a>
        </div>
    </form>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Propiedad</th>
                    <th>Propietario</th>
                    <th>Inquilino</th>
                    <th>Inicio</th>
                    <th>Duración</th>
                    <th>Importe</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="c : ${contratos}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.propiedad.direccion + ' — ' + c.propiedad.ciudad.nombre}"></td>
                    <td th:text="${c.propietario.nombreCompleto}"></td>
                    <td th:text="${c.inquilino.nombreCompleto}"></td>
                    <td th:text="${#temporals.format(c.fechaInicio, 'dd/MM/yyyy')}"></td>
                    <td th:text="${c.duracionMeses + ' meses'}"></td>
                    <td th:text="${'$' + #numbers.formatDecimal(c.importeMensual, 1, 2)}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="'badge-' + ${c.estado.name()}"
                              th:text="${c.estado}"></span>
                    </td>
                    <td class="acciones">
                        <th:block th:if="${c.estado.name() == 'BORRADOR'}">
                            <a class="btn btn-primary"
                               th:href="@{/contratos/editar/{id}(id=${c.id})}">Editar</a>
                            <a class="btn btn-danger"
                               th:href="@{/contratos/eliminar/{id}(id=${c.id})}"
                               onclick="return confirm('¿Eliminar este contrato?')">Eliminar</a>
                            <a class="btn btn-secondary"
                               th:href="@{/contratos/cambiarEstado/{id}(id=${c.id}, nuevoEstado='ACTIVO')}"
                               onclick="return confirm('¿Activar? La propiedad pasará a ALQUILADA.')">Activar</a>
                        </th:block>
                        <th:block th:if="${c.estado.name() == 'ACTIVO'}">
                            <a class="btn btn-warning"
                               th:href="@{/contratos/cambiarEstado/{id}(id=${c.id}, nuevoEstado='FINALIZADO')}"
                               onclick="return confirm('¿Finalizar? La propiedad volverá a DISPONIBLE.')">Finalizar</a>
                            <a class="btn btn-danger"
                               th:href="@{/contratos/cambiarEstado/{id}(id=${c.id}, nuevoEstado='RESCINDIDO')}"
                               onclick="return confirm('¿Rescindir? La propiedad volverá a DISPONIBLE.')">Rescindir</a>
                        </th:block>
                        <th:block th:if="${c.estado.name() == 'FINALIZADO' or c.estado.name() == 'RESCINDIDO'}">
                            <span style="color:#aaa;">—</span>
                        </th:block>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<footer class="footer">HogarYA &mdash; Grupo GomezRoblesTierno &mdash; UTN FRSF DESI 2026</footer>
</body>
</html>
